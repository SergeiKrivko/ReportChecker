<div class="container page-sized">
  <app-header [showTitle]="true"/>
  <div class="buttons-container">
    @let limits = limits$ | async;
    <button tuiButton routerLink="./reports/new" iconStart="@tui.plus" [disabled]="limits?.reports | limitReached">Добавить</button>
    @if (limits) {
      <app-subscription-limit [limit]="limits.reports" />
    }
  </div>
  <tui-scrollbar>
    <div class="reports-container">
      @for (report of reports$ | async; track report.id) {
        <a tuiCardLarge tuiHeader tuiSurface="floating" [routerLink]="'reports/' + report.id">
          <h3>{{ report.name }}</h3>
        </a>
      }
    </div>
  </tui-scrollbar>
</div>
