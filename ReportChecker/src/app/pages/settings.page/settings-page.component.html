<form class="container page-padding" [formGroup]="control">
  <div class="section-header">
    <h3>Название</h3>
  </div>
  <tui-textfield>
    <input tuiTextfield formControlName="name">
  </tui-textfield>

  <div class="section-header">
    <h3>ИИ-агент</h3>
  </div>
  <div class="grid-container">
    <label tuiLabel>Модель:</label>
    <tui-textfield [stringify]="stringifyModel">
      <input placeholder="По умолчанию" tuiSelect formControlName="llmModel"/>
      @let models = models$ | async;
      <tui-data-list-wrapper *tuiTextfieldDropdown new [items]="models"/>
    </tui-textfield>
    <label tuiLabel>Обработка изображений:</label>
    <tui-textfield [stringify]="stringifyImageProcessingMode">
      <input placeholder="Отключить" tuiSelect formControlName="imageProcessingMode"/>
      <tui-data-list-wrapper *tuiTextfieldDropdown new [items]="imageProcessingModes"/>
    </tui-textfield>
  </div>

  <div class="section-header">
    <h3>Инструкции</h3>
    <button tuiButton iconStart="@tui.plus" (click)="addInstruction()" appearance="flat">Добавить</button>
  </div>
  @for (instruction of instructions$ | async; track instruction.id) {
    <app-instruction-input [instruction]="instruction"/>
  }

  <div class="section-header">
    <h3>Управление</h3>
  </div>
  <button tuiButton appearance="outline-destructive" iconStart="@tui.trash" (click)="deleteReport()">Удалить отчет
  </button>

</form>
