<div class="container">
  <div class="header-container">
    <div class="logo" routerLink="/">
      <tui-avatar src="favicon.svg"/>
      @if (showTitle$ | async) {
        <h1 routerLink="/">ReportChecker</h1>
      }
    </div>

    <tui-scrollbar class="path">
      <tui-breadcrumbs size="l">
        @for (itemObservable of items$ | async; track itemObservable) {
          <ng-container>
            @let item = itemObservable | async;
            <a *tuiItem tuiLink [routerLink]="item?.link" [iconStart]="item?.icon" [innerHTML]="item?.name"></a>
          </ng-container>
        }
      </tui-breadcrumbs>
    </tui-scrollbar>

    @let userInfo = userInfo$ | async;
    <a tuiButton routerLink="/auth" class="account-button"
       appearance="secondary">
      @if (userInfo) {
        <tui-avatar [src]="userInfo?.avatarUrl" size="m"/>
        <label>{{ userInfo?.name }}</label>
      } @else {
        <tui-icon icon="@tui.log-in" />
        <label>Войти</label>
      }
    </a>
  </div>
</div>
