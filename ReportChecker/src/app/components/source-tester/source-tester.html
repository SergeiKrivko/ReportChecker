<form class="container" [formGroup]="control">
  @switch (sourceInfo?.status) {
    @case ('NotFound') {
      <tui-notification size="l" appearance="negative">
        Источник не найден
      </tui-notification>
    }
    @case ('WrongFormat') {
      <tui-notification size="l" appearance="negative">
        Некорректный формат
      </tui-notification>
    }
    @case ('Success') {
      <tui-notification size="l" appearance="positive">
        Формат: <b>{{ sourceInfo?.format }}</b>
      </tui-notification>
    }
  }
  <label tuiLabel>Модель:</label>
  <tui-textfield [stringify]="stringifyModel">
    <input placeholder="По умолчанию" tuiSelect formControlName="llmModel"/>
    @let models = models$ | async;
    <tui-data-list-wrapper *tuiTextfieldDropdown new [items]="models"/>
  </tui-textfield>
  <button tuiButton iconStart="@tui.check" (click)="createReport()" [disabled]="sourceInfo?.status !== 'Success'">
    Создать отчет
  </button>
</form>
