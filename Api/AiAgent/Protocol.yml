name: AiAgent

endpoints:
  FindIssues:
    input: IssuesRequest
    output: IssueCreate[]
    mode: json

  WriteComment:
    input: WriteCommentRequest
    output: CommentResponse
    mode: json
  
  CheckIssues:
    input: IssuesRequest
    output: CommentCreate[]
    mode: json
  
  ApplyInstruction:
    input: InstructionRequest
    output: CommentCreate[]
    mode: json
  
  SearchInstruction:
    input: InstructionRequest
    output: IssueCreate[]
    mode: json

schemas:
  IssueRead:
    - name: id
      type: uuid

    - name: title
      type: string

    - name: status
      type: string

    - name: priority
      type: int
      description: От 1 до 10, где 1 - наиболее критичные ошибки, 10 - незначительные предложения.

    - name: comments
      type: CommentRead[]

  CommentRead:
    - name: id
      type: uuid

    - name: content
      type: string?

    - name: status
      type: string?

    - name: role
      type: string
      
    - name: patch
      type: PatchRead?

  IssueCreate:
    - name: chapter
      type: string

    - name: title
      type: string
      description: Короткое описание ошибки

    - name: priority
      type: int
      description: От 1 до 10, где 1 - наиболее критичные ошибки, 10 - незначительные предложения.

    - name: comment
      type: string
      description: Расширенное описание ошибки
      
    - name: patch
      type: PatchLine[]?

  CommentCreate:
    - name: issueId
      type: uuid

    - name: content
      type: string?

    - name: status
      type: string?
  
  Chapter:
    - name: name
      type: string

    - name: text
      type: string

    - name: issues
      type: IssueRead[]?
      
  IssuesRequest:
    - name: chapters
      type: Chapter[]

    - name: instructions
      type: string[]
  
  WriteCommentRequest:
    - name: text
      type: string

    - name: issue
      type: IssueRead
      
    - name: instructions
      type: string[]

  InstructionCreate:
    - name: instructionText
      type: string

    - name: apply
      type: bool

    - name: search
      type: bool

    - name: save
      type: bool

  CommentResponse:
    - name: comment
      type: CommentCreate

    - name: instruction
      type: InstructionCreate?
      
    - name: patch
      type: PatchLine[]?
  
  InstructionRequest:
    - name: instruction
      type: string
    
    - name: chapters
      type: Chapter[]
      
  PatchLine:
    - name: number
      type: int
      
    - name: content
      type: string
      
    - name: type
      type: string
      
  PatchRead:
    - name: status
      type: string
      
    - name: lines
      type: PatchLine[]
